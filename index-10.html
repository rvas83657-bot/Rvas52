// ═══════════════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE — génère tout en Web Audio API, zéro fichier externe
// ═══════════════════════════════════════════════════════════════════════════════
function createAudioEngine() {
  let ctx = null;
  let ambientNodes = [];
  let ambientRunning = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function note(freq, type, start, dur, vol, freqEnd, ac, dest) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + start + dur * 0.8);
    g.gain.setValueAtTime(0, ac.currentTime + start);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime + start + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    o.connect(g); g.connect(dest);
    o.start(ac.currentTime + start);
    o.stop(ac.currentTime + start + dur + 0.05);
  }

  function play(type) {
    try {
      const ac = getCtx();
      const master = ac.createGain();
      const comp = ac.createDynamicsCompressor();
      master.connect(comp); comp.connect(ac.destination);

      if (type === "water") {
        master.gain.value = 0.4;
        note(520, "sine", 0, 0.18, 0.3, 270, ac, master);
        note(340, "sine", 0.04, 0.14, 0.15, 190, ac, master);
        note(700, "sine", 0, 0.06, 0.08, 600, ac, master);
      }
      else if (type === "sun") {
        master.gain.value = 0.35;
        note(1100, "triangle", 0, 0.12, 0.28);
        note(1400, "triangle", 0.05, 0.1, 0.18);
        note(880, "sine", 0.02, 0.15, 0.12);
        [1100, 1400, 880].forEach((f, i) => note(f, ["triangle","triangle","sine"][i], [0,0.05,0.02][i], [0.12,0.1,0.15][i], [0.28,0.18,0.12][i], null, ac, master));
      }
      else if (type === "evolve") {
        master.gain.value = 0.45;
        const scale = [261.6, 329.6, 392, 523.3, 659.3, 784, 1046.5, 1318.5];
        scale.forEach((f, i) => note(f, "sine", i * 0.07, 0.5, 0.2, null, ac, master));
        note(130, "triangle", 0, 0.9, 0.08, null, ac, master);
        note(196, "triangle", 0.1, 0.7, 0.06, null, ac, master);
      }
      else if (type === "critical") {
        master.gain.value = 0.5;
        [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => note(f, "sine", i * 0.04, 0.4, 0.22, null, ac, master));
        note(65, "sawtooth", 0, 0.2, 0.05, null, ac, master);
      }
      else if (type === "prestige") {
        master.gain.value = 0.4;
        for (let i = 0; i < 16; i++) note(261 * Math.pow(2, i / 12), "sine", i * 0.055, 0.6, 0.16, null, ac, master);
        note(55, "triangle", 0, 1.2, 0.07, null, ac, master);
      }
      else if (type === "buy") {
        master.gain.value = 0.3;
        note(660, "sine", 0, 0.1, 0.25, 880, ac, master);
        note(880, "triangle", 0.08, 0.1, 0.15, null, ac, master);
      }
      else if (type === "achievement") {
        master.gain.value = 0.4;
        [523, 659, 784, 1046, 1318].forEach((f, i) => note(f, "sine", i * 0.08, 0.35, 0.22, null, ac, master));
      }
      else if (type === "levelup") {
        master.gain.value = 0.45;
        [392, 523, 659, 784, 1046, 1318, 1568].forEach((f, i) => note(f, "sine", i * 0.07, 0.45, 0.2, null, ac, master));
      }
      else if (type === "error") {
        master.gain.value = 0.2;
        note(180, "sawtooth", 0, 0.12, 0.15, 120, ac, master);
      }
      else if (type === "click") {
        master.gain.value = 0.15;
        note(900, "sine", 0, 0.05, 0.12, 750, ac, master);
      }
      else if (type === "boost_start") {
        master.gain.value = 0.4;
        [220, 440, 880, 1760].forEach((f, i) => note(f, "sine", i * 0.05, 0.3, 0.2, null, ac, master));
      }
    } catch (e) {}
  }

  function startAmbient() {
    if (ambientRunning) return;
    try {
      const ac = getCtx();
      ambientRunning = true;

      // Drone grave profond — bourdon de fond
      const drone = ac.createOscillator();
      const droneGain = ac.createGain();
      const droneFilter = ac.createBiquadFilter();
      drone.type = "sine"; drone.frequency.value = 55;
      droneFilter.type = "lowpass"; droneFilter.frequency.value = 200;
      droneGain.gain.value = 0.04;
      drone.connect(droneFilter); droneFilter.connect(droneGain); droneGain.connect(ac.destination);
      drone.start();
      ambientNodes.push(drone, droneGain, droneFilter);

      // Harmonique douce
      const harm = ac.createOscillator();
      const harmGain = ac.createGain();
      harm.type = "sine"; harm.frequency.value = 110;
      harmGain.gain.value = 0.02;
      harm.connect(harmGain); harmGain.connect(ac.destination);
      harm.start();
      ambientNodes.push(harm, harmGain);

      // LFO qui module le drone (respiration)
      const lfo = ac.createOscillator();
      const lfoGain = ac.createGain();
      lfo.frequency.value = 0.08; lfoGain.gain.value = 8;
      lfo.connect(lfoGain); lfoGain.connect(drone.frequency);
      lfo.start();
      ambientNodes.push(lfo, lfoGain);

      // Notes mélodiques aléatoires planantes
      const pentatonic = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3, 784];
      let melodyTimer;
      function schedMelody() {
        if (!ambientRunning) return;
        const f = pentatonic[Math.floor(Math.random() * pentatonic.length)] * (Math.random() > 0.5 ? 1 : 0.5);
        const mel = ac.createOscillator();
        const melGain = ac.createGain();
        const melRev = ac.createConvolver ? null : null;
        mel.type = "triangle"; mel.frequency.value = f;
        melGain.gain.setValueAtTime(0, ac.currentTime);
        melGain.gain.linearRampToValueAtTime(0.025, ac.currentTime + 0.3);
        melGain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 2.5);
        mel.connect(melGain); melGain.connect(ac.destination);
        mel.start(); mel.stop(ac.currentTime + 3);
        const nextIn = 1800 + Math.random() * 3000;
        melodyTimer = setTimeout(schedMelody, nextIn);
      }
      schedMelody();
      ambientNodes.push({ stop: () => { clearTimeout(melodyTimer); } });

    } catch (e) {}
  }

  function stopAmbient() {
    ambientRunning = false;
    ambientNodes.forEach(n => { try { if (n.stop) n.stop(); if (n.disconnect) n.disconnect(); } catch (e) {} });
    ambientNodes = [];
  }

  return { play, startAmbient, stopAmbient };
}

function getLv(xp){ return[...LEVELS].reverse().find(l=>xp>=l.xp)||LEVELS[0]; }
function getNxtLv(xp){ return LEVELS.find(l=>l.xp>xp)||null; }
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+"T";
  if(n>=1e9)return(n/1e9).toFixed(2)+"B";
  if(n>=1e6)return(n/1e6).toFixed(2)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"k";
  return Math.floor(n).toString();
}

function App() {
  const [phase, setPhase] = useState("loading"); // loading | intro | game
  const [loadPct, setLoadPct] = useState(0);
  const [introStep, setIntroStep] = useState(0);

  useEffect(() => {
    let val = 0;
    const msgs = ["Initialisation du potager…","Plantation des graines…","Invocation du soleil…","Calcul des nutriments…","Préparation de l'évolution…","Chargement de la magie…","Tout est prêt !"];
    const iv = setInterval(() => {
      val += Math.random() * 4 + 1;
      if (val >= 100) { val = 100; clearInterval(iv); setTimeout(() => setPhase("intro"), 600); }
      setLoadPct(Math.min(val, 100));
    }, 60);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (phase !== "intro") return;
    const steps = [0,1,2,3];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      if (i < steps.length) setIntroStep(i);
      else { clearInterval(iv); setTimeout(() => setPhase("game"), 800); }
    }, 900);
    return () => clearInterval(iv);
  }, [phase]);

  if (phase === "loading") return <LoadingScreen pct={loadPct} />;
  if (phase === "intro")   return <IntroScreen step={introStep} />;
  return <GameScreen />;
}

  try {

    if (s) return JSON.parse(s);

  return null;
}

  try { localStorage.setItem("vegevo_save", JSON.stringify({...data, savedAt: Date.now()})); return true; }
  catch(e) { return false; }
}

  const veggie = CHAIN[evo];

  // Bonus totaux
  const extraCrit = SHOP.filter(i=>i.t==="crit").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0);
  const gemBonus = useMemo(()=>{

    if(gemOwned["g_xp"])    xpM  *= Math.pow(2, gemOwned["g_xp"]);
    if(gemOwned["g_coins"]) coinsM *= Math.pow(2, gemOwned["g_coins"]);
    if(gemOwned["g_crit"])  critB += (gemOwned["g_crit"]||0)*10;
    if(gemOwned["g_crit2"]) critB += (gemOwned["g_crit2"]||0)*30;
    if(gemOwned["g_mega"])  megaM *= Math.pow(5, gemOwned["g_mega"]);
    return {wM,sM,autoB,xpM,coinsM,critB,megaM};
  },[gemOwned]);
  const realCrit  = Math.min(critChance + extraCrit + (gemBonus.critB||0), 80);
  const boostNow  = boostEnd > Date.now() ? boostMul : 1;
  const boostTimeLeft = Math.max(0, Math.ceil((boostEnd - Date.now()) / 1000));

  const wClick = pMul * boostNow * gemBonus.wM * gemBonus.megaM * (1 + SHOP.filter(i=>i.t==="wClic").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));
  const sClick = pMul * boostNow * gemBonus.sM * gemBonus.megaM * (1 + SHOP.filter(i=>i.t==="sClic").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));
  const wAuto  = pMul * boostNow * gemBonus.megaM * ((gemBonus.autoB||0) + SHOP.filter(i=>i.t==="wAuto").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));
  const sAuto  = pMul * boostNow * gemBonus.megaM * ((gemBonus.autoB||0) + SHOP.filter(i=>i.t==="sAuto").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));

    const totalProb = WHEEL_SEGMENTS.reduce((s,seg)=>s+seg.prob,0);

    let chosen = WHEEL_SEGMENTS[0];
    for(const seg of WHEEL_SEGMENTS){ rand-=seg.prob; if(rand<=0){chosen=seg;break;} }

  const JBIN_KEY = "$2a$10$4QUUK7aqV8G/NnltJ/ZZSO8n0iZSDOsdMgD53WDSx4qGN/AagqmKu";

    {key:"wClic",label:"💧 Eau/clic"},{key:"sClic",label:"☀️ Sol/clic"},

          }}>
            <div style={{fontSize:16,fontWeight:700,color:"#c0983a",marginBottom:4}}>🎰 Roue de la Fortune</div>

            </div>

            {/* Roue SVG */}
            <div style={{position:"relative",width:240,height:240,margin:"0 auto 16px"}}>
              {/* Flèche indicateur */}
              <div style={{
                position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",
                fontSize:24,zIndex:10,filter:"drop-shadow(0 2px 4px rgba(0,0,0,.8))",
              }}>▼</div>
              <svg viewBox="0 0 240 240" style={{
                width:240,height:240,
                transform:`rotate(${wheelAngle}deg)`,
                transition:wheelSpinning?"transform 4s cubic-bezier(0.17,0.67,0.12,0.99)":"transform .3s ease",
              }}>
                {WHEEL_SEGMENTS.map((seg,i)=>{
                  const total=WHEEL_SEGMENTS.length;
                  const angle=360/total;
                  const startAngle=(i*angle-90)*Math.PI/180;
                  const endAngle=((i+1)*angle-90)*Math.PI/180;
                  const r=108,cx=120,cy=120;
                  const x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
                  const x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
                  const midAngle=((i+0.5)*angle-90)*Math.PI/180;
                  const tx=cx+(r*0.65)*Math.cos(midAngle),ty=cy+(r*0.65)*Math.sin(midAngle);
                  return(
                    <g key={i}>
                      <path d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z`}
                        fill={seg.color} stroke="#0e1610" strokeWidth="2"/>
                      <text x={tx} y={ty} textAnchor="middle" dominantBaseline="middle"
                        fontSize="9" fill="#fff" fontWeight="bold"
                        transform={`rotate(${(i+0.5)*angle},${tx},${ty})`}>{seg.label}</text>
                    </g>
                  );
                })}
                <circle cx="120" cy="120" r="18" fill="#0e1610" stroke="#c0983a" strokeWidth="2"/>
                <text x="120" y="120" textAnchor="middle" dominantBaseline="middle" fontSize="14">🎰</text>
              </svg>

          </div>

      {/* ── Modal Prestige ── */}

                      <span style={{color:"rgba(255,255,255,.8)",fontWeight:600,fontSize:11}}>{fmt(val)} / {fmt(need)}</span>
                    </div>
                    <div style={{background:"rgba(0,0,0,.35)",borderRadius:999,height:16,overflow:"hidden",border:"2px solid rgba(255,255,255,.1)"}}>
                      <div style={{
                        height:"100%",borderRadius:999,
                        background:`linear-gradient(90deg,${col},${light})`,
                        width:`${pct}%`,transition:"width .2s ease",
                        boxShadow:`0 0 10px ${col}88`,
                      }}/>
                      {pct>=100&&<div style={{
                        position:"relative",top:-16,inset:0,height:16,
                        background:"linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent)",
                        backgroundSize:"200% 100%",animation:"shimmerBar 1s linear infinite",
                        borderRadius:999,
                      }}/>}
                    </div>
                    <div style={{fontSize:9,color:"rgba(255,255,255,.4)",marginTop:3,textAlign:"right"}}>+{fmt(clk)}/clic</div>
                  </div>
                ))}
              </div>

              {/* Boutons clic */}
              <div style={{display:"flex",gap:12,width:"100%"}}>
                <button className="tap btn-water" onClick={()=>handleClick("water")} style={{
                  flex:1,padding:"18px 0",borderRadius:20,
                  border:"none",color:"#fff",
                  fontSize:30,cursor:"pointer",fontFamily:"inherit",
                  transition:"transform .1s,box-shadow .1s",
                }}>
                  💧
                  <div style={{fontSize:11,marginTop:3,fontWeight:700}}>+{fmt(wClick)}</div>
                </button>
                <button className="tap btn-sun" onClick={()=>handleClick("sun")} style={{
                  flex:1,padding:"18px 0",borderRadius:20,
                  border:"none",color:"#fff",
                  fontSize:30,cursor:"pointer",fontFamily:"inherit",
                  transition:"transform .1s,box-shadow .1s",
                }}>
                  ☀️
                  <div style={{fontSize:11,marginTop:3,fontWeight:700}}>+{fmt(sClick)}</div>
                </button>
              </div>

              {/* Prochaine evo info */}
              {CHAIN[evo+1]&&(
                <div style={{
                  width:"100%",padding:"10px 14px",borderRadius:18,
                  background:"rgba(0,0,0,.25)",border:"2px solid rgba(255,255,255,.15)",
                  display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,fontWeight:700,
                }}>
                  <span style={{color:"#fff"}}>Prochain : {CHAIN[evo+1].emoji} <span style={{color:"rgba(255,255,255,.8)"}}>{CHAIN[evo+1].name}</span></span>
                  <span style={{color:"#ffd700"}}>+{fmt(veggie.coins)}🪙</span>
                </div>
              )}
            </>)}

            {isMax&&(
              <div style={{
                textAlign:"center",padding:"28px 20px",width:"100%",
                background:"linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,180,0,.08))",
                borderRadius:24,border:"3px solid #ffd70066",
                animation:"glowPulse 2.5s infinite","--gc":"#ffd700",
                boxShadow:"0 8px 32px rgba(255,215,0,.2)",
              }}>
                <div style={{fontSize:70,animation:"float 3s ease-in-out infinite"}}>✨</div>
                <div style={{fontSize:22,color:"#ffd700",fontWeight:900,margin:"10px 0 6px",textShadow:"0 2px 12px #ffd70088"}}>Végétal Divin !</div>
                <div style={{color:"rgba(255,255,255,.7)",fontSize:13,lineHeight:1.7}}>
                  Tu as atteint la perfection ! 🏆<br/>
                  {totalEvo} évolutions · {pCount} prestiges
                </div>
                <button className="tap" onClick={()=>setShowPrestige(true)} style={{
                  marginTop:16,padding:"12px 28px",borderRadius:18,
                  background:"linear-gradient(145deg,#a07010,#f0c030)",
                  border:"none",color:"#fff",boxShadow:"0 5px 0 #705010",
                  cursor:"pointer",fontSize:15,fontWeight:900,fontFamily:"inherit",
                }}>♻️ Nouvelle Renaissance !</button>
              </div>
            )}
          </div>
        )}

        {/* ══════ BOUTIQUE FUSIONNÉE ══════ */}
        {tab==="shop"&&(
          <div style={{display:"flex",flexDirection:"column",gap:9,animation:"fadeSlideIn .3s ease"}}>

            {/* Soldes */}
            <div style={{display:"flex",gap:8}}>
              <div style={{
                flex:1,textAlign:"center",padding:"10px 8px",
                background:"rgba(0,0,0,.25)",border:"2px solid rgba(255,215,0,.3)",
                borderRadius:16,
              }}>
                <div style={{fontSize:22,fontWeight:900,color:"#ffd700"}}>🪙 {fmt(coins)}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:2}}>Pièces</div>
              </div>
              <div style={{
                flex:1,textAlign:"center",padding:"10px 8px",
                background:"rgba(0,0,0,.25)",border:"2px solid rgba(122,212,255,.3)",
                borderRadius:16,
              }}>
                <div style={{fontSize:22,fontWeight:900,color:"#7ad4ff"}}>💎 {gems}</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:2}}>Gemmes</div>
              </div>
            </div>

            {/* Résumé bonus */}
            <div style={{
              background:"rgba(0,0,0,.2)",border:"2px solid rgba(255,255,255,.1)",
              borderRadius:14,padding:"8px 12px",
              display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,fontSize:11,fontWeight:600,
            }}>
              <span style={{color:"#7ad4ff"}}>💧 +{fmt(wClick)}/clic</span>
              <span style={{color:"#ffd070"}}>☀️ +{fmt(sClick)}/clic</span>
              {wAuto>0&&<span style={{color:"#7ad4ff"}}>🚿 +{fmt(wAuto)}/s</span>}
              {sAuto>0&&<span style={{color:"#ffd070"}}>🌤️ +{fmt(sAuto)}/s</span>}
              <span style={{color:"#ff9070"}}>🎯 {realCrit}% crit</span>
              {pCount>0&&<span style={{color:"#ffd700"}}>♻️ ×{pMul.toFixed(1)}</span>}
            </div>

            {/* Bonus gemmes actifs */}
            {Object.keys(gemOwned).length>0&&(
              <div style={{
                background:"rgba(122,180,255,.08)",border:"2px solid rgba(122,180,255,.2)",
                borderRadius:14,padding:"8px 12px",
              }}>
                <div style={{fontSize:11,color:"#7ad4ff",fontWeight:700,marginBottom:6}}>✨ Bonus permanents actifs</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {GEM_SHOP.filter(g=>gemOwned[g.id]).map(g=>(
                    <div key={g.id} style={{
                      background:"rgba(122,180,255,.15)",border:"1px solid rgba(122,180,255,.3)",
                      borderRadius:8,padding:"3px 8px",fontSize:10,color:"#7ad4ff",fontWeight:600,
                    }}>{g.icon} {g.name} ×{gemOwned[g.id]}</div>
                  ))}
                </div>
              </div>
            )}

            {/* Sous-onglets boutique */}
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[...shopGroups, {key:"gemshop",label:"💎 Gemmes"}].map(g=>(
                <button key={g.key} className="tap" onClick={()=>setShopTab(g.key)} style={{
                  flex:1,minWidth:50,padding:"7px 3px",borderRadius:12,border:"none",
                  background:shopTab===g.key
                    ?g.key==="gemshop"?"linear-gradient(145deg,#2a4a7a,#4a7abd)":"linear-gradient(145deg,#2a6030,#4a9050)"
                    :"rgba(255,255,255,.12)",
                  color:"#fff",fontWeight:shopTab===g.key?800:500,
                  cursor:"pointer",fontSize:10,
                  boxShadow:shopTab===g.key?"0 3px 0 rgba(0,0,0,.3)":"0 2px 0 rgba(0,0,0,.2)",
                  fontFamily:"inherit",transition:"all .15s",
                }}>{g.label}</button>
              ))}
            </div>

            {/* Items pièces */}
            {shopTab!=="gemshop"&&SHOP.filter(i=>i.t===shopTab).map(item=>{
              const cost=costs[item.id], count=owned[item.id]||0, can=coins>=cost;
              return(
                <div key={item.id} className="tap shop-row" onClick={()=>onBuy(item)} style={{
                  display:"flex",alignItems:"center",gap:10,
                  background:can?"rgba(255,255,255,.08)":"rgba(0,0,0,.2)",
                  border:`2px solid ${can?"rgba(255,255,255,.18)":"rgba(255,255,255,.05)"}`,
                  borderRadius:16,padding:"10px 12px",
                  cursor:can?"pointer":"not-allowed",
                  opacity:can?1:.4,transition:"all .15s",
                }}>
                  <span style={{fontSize:24,flexShrink:0}}>{item.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>
                      {item.name}
                      {count>0&&<span style={{color:"#ffd700",fontSize:11,marginLeft:5}}>×{count}</span>}
                    </div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.55)",marginTop:1}}>{item.desc}</div>
                  </div>
                  <div style={{
                    background:can?"linear-gradient(145deg,#2a6030,#4a9050)":"rgba(0,0,0,.3)",
                    borderRadius:10,padding:"5px 10px",fontSize:11,fontWeight:800,
                    color:can?"#fff":"#555",whiteSpace:"nowrap",flexShrink:0,
                    boxShadow:can?"0 3px 0 #1a4020":"none",
                  }}>{fmt(cost)}🪙</div>
                </div>
              );
            })}

            {/* Items gemmes */}
            {shopTab==="gemshop"&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{
                  textAlign:"center",fontSize:12,color:"rgba(255,255,255,.6)",fontWeight:600,
                  padding:"6px",background:"rgba(122,180,255,.08)",borderRadius:10,
                }}>💎 Bonus permanents — conservés après Renaissance !</div>
                {GEM_SHOP.map(item=>{
                  const count=gemOwned[item.id]||0, can=gems>=item.cost;
                  return(
                    <div key={item.id} className="tap shop-row" onClick={()=>buyGem(item)} style={{
                      display:"flex",alignItems:"center",gap:10,
                      background:can?"rgba(122,180,255,.08)":"rgba(0,0,0,.2)",
                      border:`2px solid ${can?"rgba(122,180,255,.25)":"rgba(255,255,255,.05)"}`,
                      borderRadius:16,padding:"10px 12px",
                      cursor:can?"pointer":"not-allowed",
                      opacity:can?1:.4,transition:"all .15s",
                    }}>
                      <span style={{fontSize:24,flexShrink:0}}>{item.icon}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#fff"}}>
                          {item.name}
                          {count>0&&<span style={{color:"#7ad4ff",fontSize:11,marginLeft:5}}>×{count}</span>}
                        </div>
                        <div style={{fontSize:10,color:"rgba(255,255,255,.55)",marginTop:1}}>{item.desc}</div>
                      </div>
                      <div style={{
                        background:can?"linear-gradient(145deg,#2a4a7a,#4a7abd)":"rgba(0,0,0,.3)",
                        borderRadius:10,padding:"5px 10px",fontSize:11,fontWeight:800,
                        color:can?"#fff":"#555",whiteSpace:"nowrap",flexShrink:0,
                        boxShadow:can?"0 3px 0 #1a3060":"none",
                      }}>{item.cost}💎</div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ══════ SUCCÈS ══════ */}
        {tab==="achievements"&&(
          <div style={{display:"flex",flexDirection:"column",gap:7,animation:"fadeSlideIn .3s ease"}}>
            <div style={{textAlign:"center",fontSize:12,color:"rgba(255,255,255,.6)",fontWeight:700,marginBottom:4}}>
              {unlockedAch.length}/{ACHIEVEMENTS.length} débloqués 🏅
            </div>
            <div style={{background:"rgba(0,0,0,.35)",borderRadius:999,height:8,overflow:"hidden",marginBottom:6,border:"2px solid rgba(255,255,255,.1)"}}>
              <div style={{
                height:"100%",borderRadius:999,
                background:"linear-gradient(90deg,#e67e22,#ffd700)",
                width:`${unlockedAch.length/ACHIEVEMENTS.length*100}%`,transition:"width .8s ease",
                boxShadow:"0 0 8px #ffd70066",
              }}/>
            </div>
            {ACHIEVEMENTS.map(a=>{
              const done=unlockedAch.includes(a.id);
              return(
                <div key={a.id} style={{
                  display:"flex",alignItems:"center",gap:10,
                  background:done?"rgba(255,215,0,.1)":"rgba(255,255,255,.05)",
                  border:`2px solid ${done?"rgba(255,215,0,.35)":"rgba(255,255,255,.08)"}`,
                  borderRadius:16,padding:"10px 12px",
                  opacity:done?1:.45,transition:"all .4s",
                }}>
                  <span style={{fontSize:26,filter:done?"none":"grayscale(1)"}}>{a.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:done?"#ffd700":"rgba(255,255,255,.4)"}}>{a.t}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,.4)",marginTop:1}}>{a.d}</div>
                  </div>
                  {done&&<div style={{color:"#7bed9f",fontSize:20,fontWeight:900}}>✓</div>}
                </div>
              );
            })}

            {/* Bouton reset */}
            <div style={{marginTop:8,padding:"12px",background:"rgba(255,0,0,.05)",border:"2px solid rgba(255,80,80,.2)",borderRadius:16,textAlign:"center"}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.4)",marginBottom:8}}>⚠️ Supprimer toute la sauvegarde</div>
              <button className="tap" onClick={()=>{
                if(window.confirm("Supprimer TOUTE ta progression ? Cette action est irréversible !")){
                  localStorage.removeItem("vegevo_save");
                  window.location.reload();
                }
              }} style={{
                padding:"8px 20px",borderRadius:12,
                background:"rgba(200,50,50,.3)",border:"2px solid rgba(255,80,80,.3)",
                color:"#ff8080",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",
              }}>🗑️ Recommencer à zéro</button>
            </div>
          </div>
        )}

        {/* ══════ CLASSEMENT MONDIAL ══════ */}
        {tab==="leaderboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeSlideIn .35s ease"}}>

            {/* Bannière mondiale */}
            <div style={{
              textAlign:"center",padding:"14px 12px",
              background:"linear-gradient(135deg,rgba(180,150,50,.08),rgba(74,120,64,.08))",
              borderRadius:16,border:"1px solid rgba(180,150,50,.2)",
            }}>
              <div style={{fontSize:28,marginBottom:4}}>🌍</div>
              <div style={{fontSize:15,fontWeight:700,color:"#c0d4b8",letterSpacing:1}}>Classement Mondial</div>
              <div style={{fontSize:10,color:"#4a6a40",marginTop:2}}>Les meilleurs joueurs du monde entier</div>
            </div>

            {/* Inscription / Mise à jour score */}
            {!playerName ? (
              <div style={{
                background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",
                borderRadius:14,padding:"14px 14px",
              }}>
                <div style={{fontSize:12,color:"#8aaa78",marginBottom:10,fontWeight:600}}>
                  📝 Inscris-toi au classement
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    value={nameInput}
                    onChange={e=>setNameInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&submitScore(nameInput)}
                    placeholder="Ton pseudo (2-16 car.)"
                    maxLength={16}
                    style={{
                      flex:1,background:"rgba(0,0,0,.4)",border:"1px solid rgba(255,255,255,.1)",
                      borderRadius:10,padding:"8px 12px",color:"#c0d4b8",fontSize:13,
                      fontFamily:"inherit",outline:"none",
                    }}
                  />
                  <button className="tap" onClick={()=>submitScore(nameInput)} disabled={submitLoading||nameInput.trim().length<2} style={{
                    padding:"8px 14px",borderRadius:10,
                    background:nameInput.trim().length>=2?"linear-gradient(135deg,#2a5020,#4a8a40aa)":"rgba(0,0,0,.3)",
                    border:`1px solid ${nameInput.trim().length>=2?"#4a7a40":"rgba(0,0,0,.2)"}`,
                    color:nameInput.trim().length>=2?"#8aaa78":"#3a4a38",
                    cursor:nameInput.trim().length>=2?"pointer":"not-allowed",
                    fontFamily:"inherit",fontSize:13,fontWeight:600,whiteSpace:"nowrap",
                  }}>{submitLoading?"…":"Rejoindre"}</button>
                </div>
                <div style={{fontSize:10,color:"#3a4a38",marginTop:6}}>
                  ⚠️ Le classement est public — ton pseudo et tes scores seront visibles par tous.
                </div>
              </div>
            ) : (
              <div style={{
                background:"rgba(180,150,50,.07)",border:"1px solid rgba(180,150,50,.2)",
                borderRadius:14,padding:"10px 14px",
                display:"flex",alignItems:"center",justifyContent:"space-between",
              }}>
                <div>
                  <div style={{fontSize:12,color:"#c0983a",fontWeight:600}}>🎮 {playerName}</div>
                  <div style={{fontSize:10,color:"#6a8060",marginTop:1}}>
                    {myRanks.coins&&`🪙 Rang #${myRanks.coins}`}
                    {myRanks.prestige&&` · ♻️ Rang #${myRanks.prestige}`}
                    {!myRanks.coins&&!myRanks.prestige&&"Pas encore classé"}
                  </div>
                </div>
                <button className="tap" onClick={()=>submitScore(playerName)} disabled={submitLoading} style={{
                  padding:"6px 12px",borderRadius:9,
                  background:"linear-gradient(135deg,#2a5020,#4a8a40aa)",
                  border:"1px solid #4a7a40",color:"#8aaa78",
                  cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,
                }}>{submitLoading?"…":"↑ Mettre à jour"}</button>
              </div>
            )}

            {/* Sous-onglets classement */}
            <div style={{display:"flex",gap:6}}>
              {[["coins","🪙 Pièces gagnées"],["prestige","♻️ Prestiges"]].map(([k,l])=>(
                <button key={k} className="tap" onClick={()=>setLbTab(k)} style={{
                  flex:1,padding:"8px 0",borderRadius:10,
                  border:`1px solid ${lbTab===k?"rgba(180,150,50,.4)":"rgba(255,255,255,.06)"}`,
                  background:lbTab===k?"rgba(180,150,50,.1)":"rgba(255,255,255,.02)",
                  color:lbTab===k?"#c0983a":"#4a6a40",
                  fontWeight:lbTab===k?700:400,cursor:"pointer",fontSize:11,fontFamily:"inherit",
                  transition:"all .2s",
                }}>{l}</button>
              ))}
            </div>

            {/* Bouton refresh */}
            <button className="tap" onClick={fetchLeaderboard} disabled={lbLoading} style={{
              padding:"7px 0",borderRadius:10,width:"100%",
              background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",
              color:"#4a6a40",cursor:"pointer",fontSize:11,fontFamily:"inherit",
              transition:"all .2s",
            }}>{lbLoading?"⏳ Chargement…":"🔄 Actualiser le classement"}</button>

            {/* Liste classement */}
            {(()=>{
              const entries = leaderboard[lbTab] || [];
              if (lbLoading) return (
                <div style={{textAlign:"center",padding:"30px",color:"#4a6a40",fontSize:13}}>
                  <div style={{fontSize:32,animation:"float 1s ease-in-out infinite"}}>🌱</div>
                  <div style={{marginTop:8}}>Chargement…</div>
                </div>
              );
              if (entries.length === 0) return (
                <div style={{
                  textAlign:"center",padding:"28px 16px",
                  background:"rgba(255,255,255,.02)",borderRadius:14,
                  border:"1px solid rgba(255,255,255,.05)",
                }}>
                  <div style={{fontSize:36,marginBottom:8}}>🌍</div>
                  <div style={{color:"#4a6a40",fontSize:12}}>Personne encore classé.<br/>Sois le premier !</div>
                </div>
              );
              const RANK_STYLES = [
                {bg:"rgba(212,175,55,.12)",border:"rgba(212,175,55,.35)",color:"#d4af37",badge:"🥇"},
                {bg:"rgba(192,192,192,.1)",border:"rgba(192,192,192,.3)",color:"#b0b8b0",badge:"🥈"},
                {bg:"rgba(176,141,87,.1)",border:"rgba(176,141,87,.3)",color:"#b08050",badge:"🥉"},
              ];
              return entries.map((entry, i) => {
                const isMe = entry.name === playerName;
                const rs = RANK_STYLES[i] || {};
                return (
                  <div key={entry.name} style={{
                    display:"flex",alignItems:"center",gap:10,
                    background:isMe?"rgba(74,120,64,.15)":rs.bg||"rgba(255,255,255,.025)",
                    border:`1px solid ${isMe?"rgba(74,120,64,.4)":rs.border||"rgba(255,255,255,.06)"}`,
                    borderRadius:13,padding:"10px 12px",
                    transition:"all .2s",
                    boxShadow:isMe?"0 0 12px rgba(74,120,64,.2)":"none",
                  }}>
                    {/* Rang */}
                    <div style={{
                      width:28,textAlign:"center",flexShrink:0,
                      fontSize:i<3?18:12,
                      color:rs.color||"#4a6a40",
                      fontWeight:700,
                    }}>{rs.badge||`#${i+1}`}</div>
                    {/* Légume */}
                    <div style={{fontSize:20,flexShrink:0}}>{entry.veggie}</div>
                    {/* Infos */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{
                        fontSize:13,fontWeight:isMe?700:600,
                        color:isMe?"#8aaa78":rs.color||"#c0d4b8",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                      }}>
                        {entry.name}{isMe&&<span style={{fontSize:10,color:"#6a9a50",marginLeft:5}}>(toi)</span>}
                      </div>
                      <div style={{fontSize:10,color:"#4a5a44",marginTop:1}}>
                        {lbTab==="coins"
                          ?`Évo. ${entry.evo+1} · ♻️ ${entry.pCount} prestiges`
                          :`${entry.totalEvo} évolutions totales`
                        }
                      </div>
                    </div>
                    {/* Score */}
                    <div style={{
                      textAlign:"right",flexShrink:0,
                    }}>
                      <div style={{
                        fontSize:13,fontWeight:700,
                        color:rs.color||"#c0983a",
                      }}>
                        {lbTab==="coins"?`${fmt(entry.score)}🪙`:`${entry.score}♻️`}
                      </div>
                      <div style={{fontSize:9,color:"#3a4a38",marginTop:1}}>
                        {new Date(entry.timestamp).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}
                      </div>
                    </div>
                  </div>
                );
              });
            })()}

          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
