// ═══════════════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE — génère tout en Web Audio API, zéro fichier externe
// ═══════════════════════════════════════════════════════════════════════════════
function createAudioEngine() {
  let ctx = null;
  let ambientNodes = [];
  let ambientRunning = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function note(freq, type, start, dur, vol, freqEnd, ac, dest) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + start + dur * 0.8);
    g.gain.setValueAtTime(0, ac.currentTime + start);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime + start + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    o.connect(g); g.connect(dest);
    o.start(ac.currentTime + start);
    o.stop(ac.currentTime + start + dur + 0.05);
  }

  function play(type) {
    try {
      const ac = getCtx();
      const master = ac.createGain();
      const comp = ac.createDynamicsCompressor();
      master.connect(comp); comp.connect(ac.destination);

      if (type === "water") {
        master.gain.value = 0.4;
        note(520, "sine", 0, 0.18, 0.3, 270, ac, master);
        note(340, "sine", 0.04, 0.14, 0.15, 190, ac, master);
        note(700, "sine", 0, 0.06, 0.08, 600, ac, master);
      }
      else if (type === "sun") {
        master.gain.value = 0.35;
        note(1100, "triangle", 0, 0.12, 0.28);
        note(1400, "triangle", 0.05, 0.1, 0.18);
        note(880, "sine", 0.02, 0.15, 0.12);
        [1100, 1400, 880].forEach((f, i) => note(f, ["triangle","triangle","sine"][i], [0,0.05,0.02][i], [0.12,0.1,0.15][i], [0.28,0.18,0.12][i], null, ac, master));
      }
      else if (type === "evolve") {
        master.gain.value = 0.45;
        const scale = [261.6, 329.6, 392, 523.3, 659.3, 784, 1046.5, 1318.5];
        scale.forEach((f, i) => note(f, "sine", i * 0.07, 0.5, 0.2, null, ac, master));
        note(130, "triangle", 0, 0.9, 0.08, null, ac, master);
        note(196, "triangle", 0.1, 0.7, 0.06, null, ac, master);
      }
      else if (type === "critical") {
        master.gain.value = 0.5;
        [523, 659, 784, 1046, 1318, 1568].forEach((f, i) => note(f, "sine", i * 0.04, 0.4, 0.22, null, ac, master));
        note(65, "sawtooth", 0, 0.2, 0.05, null, ac, master);
      }
      else if (type === "prestige") {
        master.gain.value = 0.4;
        for (let i = 0; i < 16; i++) note(261 * Math.pow(2, i / 12), "sine", i * 0.055, 0.6, 0.16, null, ac, master);
        note(55, "triangle", 0, 1.2, 0.07, null, ac, master);
      }
      else if (type === "buy") {
        master.gain.value = 0.3;
        note(660, "sine", 0, 0.1, 0.25, 880, ac, master);
        note(880, "triangle", 0.08, 0.1, 0.15, null, ac, master);
      }
      else if (type === "achievement") {
        master.gain.value = 0.4;
        [523, 659, 784, 1046, 1318].forEach((f, i) => note(f, "sine", i * 0.08, 0.35, 0.22, null, ac, master));
      }
      else if (type === "levelup") {
        master.gain.value = 0.45;
        [392, 523, 659, 784, 1046, 1318, 1568].forEach((f, i) => note(f, "sine", i * 0.07, 0.45, 0.2, null, ac, master));
      }
      else if (type === "error") {
        master.gain.value = 0.2;
        note(180, "sawtooth", 0, 0.12, 0.15, 120, ac, master);
      }
      else if (type === "click") {
        master.gain.value = 0.15;
        note(900, "sine", 0, 0.05, 0.12, 750, ac, master);
      }
      else if (type === "boost_start") {
        master.gain.value = 0.4;
        [220, 440, 880, 1760].forEach((f, i) => note(f, "sine", i * 0.05, 0.3, 0.2, null, ac, master));
      }
    } catch (e) {}
  }

  function startAmbient() {
    if (ambientRunning) return;
    try {
      const ac = getCtx();
      ambientRunning = true;

      // Drone grave profond — bourdon de fond
      const drone = ac.createOscillator();
      const droneGain = ac.createGain();
      const droneFilter = ac.createBiquadFilter();
      drone.type = "sine"; drone.frequency.value = 55;
      droneFilter.type = "lowpass"; droneFilter.frequency.value = 200;
      droneGain.gain.value = 0.04;
      drone.connect(droneFilter); droneFilter.connect(droneGain); droneGain.connect(ac.destination);
      drone.start();
      ambientNodes.push(drone, droneGain, droneFilter);

      // Harmonique douce
      const harm = ac.createOscillator();
      const harmGain = ac.createGain();
      harm.type = "sine"; harm.frequency.value = 110;
      harmGain.gain.value = 0.02;
      harm.connect(harmGain); harmGain.connect(ac.destination);
      harm.start();
      ambientNodes.push(harm, harmGain);

      // LFO qui module le drone (respiration)
      const lfo = ac.createOscillator();
      const lfoGain = ac.createGain();
      lfo.frequency.value = 0.08; lfoGain.gain.value = 8;
      lfo.connect(lfoGain); lfoGain.connect(drone.frequency);
      lfo.start();
      ambientNodes.push(lfo, lfoGain);

      // Notes mélodiques aléatoires planantes
      const pentatonic = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3, 784];
      let melodyTimer;
      function schedMelody() {
        if (!ambientRunning) return;
        const f = pentatonic[Math.floor(Math.random() * pentatonic.length)] * (Math.random() > 0.5 ? 1 : 0.5);
        const mel = ac.createOscillator();
        const melGain = ac.createGain();
        const melRev = ac.createConvolver ? null : null;
        mel.type = "triangle"; mel.frequency.value = f;
        melGain.gain.setValueAtTime(0, ac.currentTime);
        melGain.gain.linearRampToValueAtTime(0.025, ac.currentTime + 0.3);
        melGain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 2.5);
        mel.connect(melGain); melGain.connect(ac.destination);
        mel.start(); mel.stop(ac.currentTime + 3);
        const nextIn = 1800 + Math.random() * 3000;
        melodyTimer = setTimeout(schedMelody, nextIn);
      }
      schedMelody();
      ambientNodes.push({ stop: () => { clearTimeout(melodyTimer); } });

    } catch (e) {}
  }

  function stopAmbient() {
    ambientRunning = false;
    ambientNodes.forEach(n => { try { if (n.stop) n.stop(); if (n.disconnect) n.disconnect(); } catch (e) {} });
    ambientNodes = [];
  }

  return { play, startAmbient, stopAmbient };
}

function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+"T";
  if(n>=1e9)return(n/1e9).toFixed(2)+"B";
  if(n>=1e6)return(n/1e6).toFixed(2)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"k";
  return Math.floor(n).toString();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COMPOSANT RACINE
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [phase, setPhase] = useState("loading"); // loading | intro | game
  const [loadPct, setLoadPct] = useState(0);
  const [introStep, setIntroStep] = useState(0);

  useEffect(() => {
    let val = 0;
    const msgs = ["Initialisation du potager…","Plantation des graines…","Invocation du soleil…","Calcul des nutriments…","Préparation de l'évolution…","Chargement de la magie…","Tout est prêt !"];
    const iv = setInterval(() => {
      val += Math.random() * 4 + 1;
      if (val >= 100) { val = 100; clearInterval(iv); setTimeout(() => setPhase("intro"), 600); }
      setLoadPct(Math.min(val, 100));
    }, 60);
    return () => clearInterval(iv);
  }, []);

  useEffect(() => {
    if (phase !== "intro") return;
    const steps = [0,1,2,3];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      if (i < steps.length) setIntroStep(i);
      else { clearInterval(iv); setTimeout(() => setPhase("game"), 800); }
    }, 900);
    return () => clearInterval(iv);
  }, [phase]);

  if (phase === "loading") return <LoadingScreen pct={loadPct} />;
  if (phase === "intro")   return <IntroScreen step={introStep} />;
  return <GameScreen />;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  GAME SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function GameScreen() {
  const [evo, setEvo]             = useState(0);
  const [water, setWater]         = useState(0);
  const [sun, setSun]             = useState(0);
  const [coins, setCoins]         = useState(20);
  const [xp, setXp]               = useState(0);
  const [totalEvo, setTotalEvo]   = useState(0);
  const [totalCoins, setTotalCoins] = useState(20);
  const [totalBuys, setTotalBuys] = useState(0);
  const [totalCrits, setTotalCrits] = useState(0);
  const [fastEvo, setFastEvo]     = useState(false);
  const [pCount, setPCount]       = useState(0);
  const [pMul, setPMul]           = useState(1);
  const [tab, setTab]             = useState("garden");
  const [shopTab, setShopTab]     = useState("wClic");
  const [owned, setOwned]         = useState({});
  const [costs, setCosts]         = useState(()=>Object.fromEntries(SHOP.map(i=>[i.id,i.base])));
  const [unlockedAch, setUnlockedAch] = useState([]);
  const [particles, setParticles] = useState([]);
  const [toasts, setToasts]       = useState([]);
  const [evoAnim, setEvoAnim]     = useState(false);
  const [critAnim, setCritAnim]   = useState(false);
  const [boostMul, setBoostMul]   = useState(1);
  const [boostEnd, setBoostEnd]   = useState(0);
  const [showPrestige, setShowPrestige] = useState(false);
  const [ambientOn, setAmbientOn] = useState(false);
  const [critChance, setCritChance] = useState(5); // % base
  const [floatingNums, setFloatingNums] = useState([]);
  const [evoStartTime, setEvoStartTime] = useState(Date.now());
  const [lastLv, setLastLv]       = useState(1);
  const [comboCount, setComboCount] = useState(0);
  const [comboTimer, setComboTimer] = useState(null);
  const [shakeW, setShakeW]       = useState(false);
  const [shakeS, setShakeS]       = useState(false);
  const [playerName, setPlayerName] = useState("");
  const [nameInput, setNameInput]   = useState("");
  const [leaderboard, setLeaderboard] = useState({ coins: [], prestige: [] });
  const [lbLoading, setLbLoading]   = useState(false);
  const [lbTab, setLbTab]           = useState("coins");
  const [myRanks, setMyRanks]       = useState({ coins: null, prestige: null });
  const [submitLoading, setSubmitLoading] = useState(false);

  const pId = useRef(0); const toastId = useRef(0); const fnId = useRef(0);
  const autoRef = useRef(null); const boostRef = useRef(null);
  const lbSyncRef = useRef(null);

  const veggie = CHAIN[evo];
  const isMax  = evo >= CHAIN.length - 1;

  // Bonus totaux
  const extraCrit = SHOP.filter(i=>i.t==="crit").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0);
  const realCrit  = Math.min(critChance + extraCrit, 80);
  const boostNow  = boostEnd > Date.now() ? boostMul : 1;
  const boostTimeLeft = Math.max(0, Math.ceil((boostEnd - Date.now()) / 1000));

  const wClick = pMul * boostNow * (1 + SHOP.filter(i=>i.t==="wClic").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));
  const sClick = pMul * boostNow * (1 + SHOP.filter(i=>i.t==="sClic").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0));
  const wAuto  = pMul * boostNow *     SHOP.filter(i=>i.t==="wAuto").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0);
  const sAuto  = pMul * boostNow *     SHOP.filter(i=>i.t==="sAuto").reduce((s,i)=>s+(owned[i.id]||0)*i.val,0);

  // Auto production
  useEffect(()=>{
    autoRef.current=setInterval(()=>{
      if(!isMax&&(wAuto>0||sAuto>0)){
        setWater(w=>Math.min(w+wAuto/10,veggie.needW));
        setSun(s=>Math.min(s+sAuto/10,veggie.needS));
      }
    },100);
    return()=>clearInterval(autoRef.current);
  },[wAuto,sAuto,isMax,evo]);

  // Boost countdown re-render
  useEffect(()=>{
    if(boostEnd<=Date.now()) return;
    const iv=setInterval(()=>{ if(Date.now()>=boostEnd){ clearInterval(iv); setBoostMul(1); } },1000);
    return()=>clearInterval(iv);
  },[boostEnd]);

  // Check evolution
  useEffect(()=>{
    if(isMax||water<veggie.needW||sun<veggie.needS) return;
    doEvolve();
  },[water,sun,evo]);

  // Check achievements
  const gs = useMemo(()=>({evo,totalEvo,totalCoins,totalBuys,totalCrits,xp,wAuto,sAuto,pCount,fastEvo}),
    [evo,totalEvo,totalCoins,totalBuys,totalCrits,xp,wAuto,sAuto,pCount,fastEvo]);
  useEffect(()=>{
    ACHIEVEMENTS.forEach(a=>{
      if(!unlockedAch.includes(a.id)&&a.check(gs)){
        setUnlockedAch(u=>[...u,a.id]);
        AUDIO.play("achievement");
        addToast(`🏅 ${a.t} — ${a.d}`, "#b08030", 4500);
      }
    });
  },[gs]);

  // Level up
  useEffect(()=>{
    const lv=getLv(xp).lv;
    if(lv>lastLv){ AUDIO.play("levelup"); setLastLv(lv); addToast(`⬆️ Niveau ${lv} — ${getLv(xp).t}!`,"#6a9a50",3000); }
  },[xp]);

  const addToast = useCallback((msg,col="#6a9a50",dur=2500)=>{
    const id=toastId.current++;
    setToasts(t=>[...t.slice(-4),{id,msg,col}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),dur);
  },[]);

  const spawnP = useCallback((emojis,count=6,spread=100)=>{
    const pts=[];
    for(let i=0;i<count;i++){
      const id=pId.current++;
      const a=Math.random()*Math.PI*2, r=25+Math.random()*spread;
      pts.push({id,emoji:emojis[i%emojis.length],tx:Math.cos(a)*r,ty:Math.sin(a)*r-40,
        size:14+Math.random()*10});
    }
    setParticles(p=>[...p,...pts]);
    setTimeout(()=>setParticles(p=>p.filter(pt=>!pts.find(x=>x.id===pt.id))),1500);
  },[]);

  const addFloat = useCallback((text, col="#c8d8c0", big=false)=>{
    const id=fnId.current++;
    const x=40+Math.random()*20;
    setFloatingNums(f=>[...f.slice(-8),{id,text,col,x,big}]);
    setTimeout(()=>setFloatingNums(f=>f.filter(n=>n.id!==id)),1200);
  },[]);

  const doEvolve = useCallback(()=>{
    const v=CHAIN[evo]; if(!CHAIN[evo+1]) return;
    const elapsed=(Date.now()-evoStartTime)/1000;
    AUDIO.play("evolve");
    setEvoAnim(true); setTimeout(()=>setEvoAnim(false),1000);
    setEvo(e=>e+1); setWater(0); setSun(0);
    setEvoStartTime(Date.now());
    const c=Math.floor(v.coins*pMul);
    setCoins(x=>x+c); setTotalCoins(x=>x+c);
    setXp(x=>x+v.xp); setTotalEvo(e=>e+1);
    if(elapsed<10) setFastEvo(true);
    spawnP(["✨","🌟","💫","🪙","🌿","🎊","🌈"],12,130);
    addFloat(`+${fmt(c)}🪙`, "#c0983a", true);
    addFloat(`+${fmt(v.xp)}⭐`, "#6a9a50");
    const nv=CHAIN[evo+1];
    addToast(`${v.emoji}→${nv.emoji} ${v.name} → ${nv.name}`, TIER_COLORS[nv.tier]||"#6a9a50", 2800);
  },[evo,pMul,evoStartTime,spawnP,addFloat,addToast]);

  const handleClick = (type) => {
    if(isMax) return;
    const isCrit = Math.random()*100 < realCrit;

    // Combo system
    setComboCount(c=>{
      const nc=c+1;
      if(comboTimer) clearTimeout(comboTimer);
      const t=setTimeout(()=>setComboCount(0),2000);
      setComboTimer(t);
      return nc;
    });

    if(type==="water"){
      AUDIO.play(isCrit?"critical":"water");
      const mult = isCrit ? 2 : 1;
      const val = wClick * mult * (comboCount>9?1.5:comboCount>4?1.2:1);
      setWater(w=>Math.min(w+val,veggie.needW));
      spawnP(isCrit?["💧","💦","🌊"]:["💧"],isCrit?5:2,isCrit?80:40);
      if(isCrit){ setCritAnim(true); setTimeout(()=>setCritAnim(false),600); addFloat(`CRITIQUE! ×2`,"#5a9aba",true); setTotalCrits(c=>c+1); AUDIO.play("critical"); }
      else addFloat(`+${fmt(val)}💧`,"#4a7a9a");
    } else {
      AUDIO.play(isCrit?"critical":"sun");
      const mult = isCrit ? 2 : 1;
      const val = sClick * mult * (comboCount>9?1.5:comboCount>4?1.2:1);
      setSun(s=>Math.min(s+val,veggie.needS));
      spawnP(isCrit?["☀️","✨","🌟"]:["🌤️"],isCrit?5:2,isCrit?80:40);
      if(isCrit){ setCritAnim(true); setTimeout(()=>setCritAnim(false),600); addFloat(`CRITIQUE! ×2`,"#ba9a3a",true); setTotalCrits(c=>c+1); AUDIO.play("critical"); }
      else addFloat(`+${fmt(val)}☀️`,"#9a7830");
    }
  };

  const onBuy = (item)=>{
    const cost=costs[item.id];
    if(coins<cost){ AUDIO.play("error"); addToast("Pas assez de pièces 💸","#8a4040"); return; }
    if(item.t==="boost"){
      setBoostMul(item.val);
      setBoostEnd(Date.now()+item.dur*1000);
      AUDIO.play("boost_start");
      addToast(`${item.icon} ${item.name} actif ${item.dur}s!`,"#b08030",3500);
      spawnP(["⚡","✨","💫"],8,100);
    } else {
      addFloat(`+1 ${item.name}`,"#6a9a50");
    }
    AUDIO.play("buy");
    setCoins(c=>c-cost); setTotalBuys(b=>b+1);
    setOwned(o=>({...o,[item.id]:(o[item.id]||0)+1}));
    setCosts(c=>({...c,[item.id]:Math.ceil(cost*item.mul)}));
    if(item.t!=="boost") addToast(`${item.icon} ${item.name} ×${(owned[item.id]||0)+1}`,"#5a8a50");
  };

  const doPrestige = ()=>{
    if(evo<8) return;
    AUDIO.play("prestige");
    const bonus=parseFloat((1+(evo*0.12*(pCount+1))).toFixed(1));
    setPCount(p=>p+1); setPMul(bonus);
    setEvo(0); setWater(0); setSun(0);
    setOwned({}); setCosts(Object.fromEntries(SHOP.map(i=>[i.id,i.base])));
    setShowPrestige(false);
    setEvoStartTime(Date.now());
    addToast(`♻️ Prestige! Bonus ×${bonus} permanent!`,"#b08030",5000);
    spawnP(["♻️","✨","💫","⭐","🌟","🎊"],16,160);
  };

  const toggleAmbient = ()=>{
    if(ambientOn){ AUDIO.stopAmbient(); setAmbientOn(false); }
    else { AUDIO.startAmbient(); setAmbientOn(true); }
  };

  // ── LEADERBOARD ──────────────────────────────────────────────────
  const fetchLeaderboard = useCallback(async () => {
    setLbLoading(true);
    try {
      const [coinsRes, prestigeRes] = await Promise.all([
        window.storage.list("lb_coins_"),
        window.storage.list("lb_prestige_"),
      ]);
      const parseEntries = async (keys, prefix) => {
        const entries = await Promise.all(
          (keys.keys || []).map(async k => {
            try {
              const r = await window.storage.get(k, true);
              return r ? { ...JSON.parse(r.value), key: k } : null;
            } catch { return null; }
          })
        );
        return entries
          .filter(Boolean)
          .sort((a, b) => b.score - a.score)
          .slice(0, 50);
      };
      const [coinsData, prestigeData] = await Promise.all([
        parseEntries(coinsRes, "lb_coins_"),
        parseEntries(prestigeRes, "lb_prestige_"),
      ]);
      setLeaderboard({ coins: coinsData, prestige: prestigeData });
      // Find my ranks
      if (playerName) {
        const ci = coinsData.findIndex(e => e.name === playerName);
        const pi = prestigeData.findIndex(e => e.name === playerName);
        setMyRanks({ coins: ci >= 0 ? ci+1 : null, prestige: pi >= 0 ? pi+1 : null });
      }
    } catch(e) {}
    setLbLoading(false);
  }, [playerName]);

  const submitScore = useCallback(async (name) => {
    if (!name || name.trim().length < 2) return;
    setSubmitLoading(true);
    const cleanName = name.trim().slice(0, 16);
    try {
      await Promise.all([
        window.storage.set(`lb_coins_${cleanName}`,
          JSON.stringify({ name: cleanName, score: totalCoins, evo, pCount,
            veggie: CHAIN[evo]?.emoji || "🌱", timestamp: Date.now() }), true),
        window.storage.set(`lb_prestige_${cleanName}`,
          JSON.stringify({ name: cleanName, score: pCount, totalEvo, coins,
            veggie: CHAIN[evo]?.emoji || "🌱", timestamp: Date.now() }), true),
      ]);
      setPlayerName(cleanName);
      AUDIO.play("achievement");
      addToast(`🌍 ${cleanName} sur le classement!`, "#c0983a", 3000);
      await fetchLeaderboard();
    } catch(e) { addToast("Erreur de connexion", "#8a4040"); }
    setSubmitLoading(false);
  }, [totalCoins, evo, pCount, totalEvo, coins, fetchLeaderboard, addToast]);

  // Auto-sync score toutes les 60s si pseudo enregistré
  useEffect(() => {
    if (!playerName) return;
    lbSyncRef.current = setInterval(() => submitScore(playerName), 60000);
    return () => clearInterval(lbSyncRef.current);
  }, [playerName, submitScore]);

  // Charge le classement quand on ouvre l'onglet
  useEffect(() => {
    if (tab === "leaderboard") fetchLeaderboard();
  }, [tab]);

  const wPct = isMax?100:Math.min(water/veggie.needW*100,100);
  const sPct = isMax?100:Math.min(sun/veggie.needS*100,100);
  const curLv=getLv(xp), nxtLv=getNxtLv(xp);
  const lvPct=nxtLv?(xp-curLv.xp)/(nxtLv.xp-curLv.xp)*100:100;
  const prestGain=parseFloat((evo*0.12*(pCount+1)).toFixed(1));

  const shopGroups=[
    {key:"wClic",label:"💧 Eau/clic"},{key:"sClic",label:"☀️ Sol/clic"},
    {key:"wAuto",label:"🚿 Eau auto"},{key:"sAuto",label:"🌤️ Sol auto"},
    {key:"boost",label:"⚡ Boosts"},{key:"crit",label:"🎯 Critique"},
  ];

  const tierC = TIER_COLORS[veggie.tier] || "#6a9a50";

  return (
    <div style={{
      minHeight:"100vh",
      background:`radial-gradient(ellipse at 50% -10%, ${tierC}18 0%, #080e07 55%)`,
      transition:"background 1.2s ease",
      fontFamily:"'Georgia',serif",
      color:"#c0d4b8",
      display:"flex",flexDirection:"column",alignItems:"center",
      padding:"10px 10px 100px",
      overflowX:"hidden",position:"relative",
    }}>
      <style>{`
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        @keyframes riseOut{0%{opacity:1;transform:translate(-50%,-50%) translate(var(--tx),var(--ty)) scale(.9)}70%{opacity:.9}100%{opacity:0;transform:translate(-50%,-50%) translate(calc(var(--tx)*2.2),calc(var(--ty)*2.4)) scale(.1)}}
        @keyframes floatNum{0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.8)}15%{opacity:1;transform:translateX(-50%) translateY(-10px) scale(1)}85%{opacity:1;transform:translateX(-50%) translateY(-50px) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-70px) scale(.8)}}
        @keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(14px) scale(.92)}12%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-12px)}}
        @keyframes evoBlast{0%{transform:scale(1);opacity:1}30%{transform:scale(2.8);opacity:.6}60%{transform:scale(1.8);opacity:.3}100%{transform:scale(1);opacity:0}}
        @keyframes critFlash{0%,100%{background:transparent}50%{background:rgba(200,200,80,0.18)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 8px var(--gc))}50%{filter:drop-shadow(0 0 24px var(--gc)) drop-shadow(0 0 48px var(--gc))}}
        @keyframes orbitSpin{from{transform:rotate(0deg) translateX(var(--r))}to{transform:rotate(360deg) translateX(var(--r))}}
        @keyframes barFill{from{width:0}to{width:var(--w)}}
        @keyframes shimmerBar{0%{background-position:200%}100%{background-position:-200%}}
        @keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes comboFade{0%{opacity:0;transform:scale(.5)}30%{opacity:1;transform:scale(1.2)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.8)}}
        @keyframes ringExpand{0%{transform:scale(1);opacity:.8}100%{transform:scale(3);opacity:0}}
        @keyframes presGlow{0%,100%{box-shadow:0 0 0 0 rgba(180,150,50,.3)}50%{box-shadow:0 0 0 8px rgba(180,150,50,.1)}}
        .tap{cursor:pointer;transition:transform .1s,filter .12s;user-select:none;-webkit-user-select:none}
        .tap:hover{filter:brightness(1.18)}
        .tap:active{transform:scale(.91)!important}
        .card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:14px}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:#2a4020;border-radius:99px}
        .shop-row:hover{background:rgba(255,255,255,.06)!important;border-color:rgba(255,255,255,.13)!important;transform:translateX(3px)}
      `}</style>

      {/* ── Overlay critique ── */}
      {critAnim&&<div style={{position:"fixed",inset:0,animation:"critFlash .5s ease",pointerEvents:"none",zIndex:90}}/>}

      {/* ── Overlay évolution ── */}
      {evoAnim&&<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:88,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:120,animation:"evoBlast 1s ease forwards"}}>✨</div>
      </div>}

      {/* ── Modal Prestige ── */}
      {showPrestige&&(
        <div onClick={()=>setShowPrestige(false)} style={{
          position:"fixed",inset:0,background:"rgba(0,0,0,.75)",
          zIndex:700,display:"flex",alignItems:"center",justifyContent:"center",padding:16,
        }}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:"#0e1610",border:`1.5px solid ${tierC}55`,
            borderRadius:22,padding:28,maxWidth:340,width:"100%",textAlign:"center",
            animation:"fadeSlideIn .35s ease",
          }}>
            <div style={{fontSize:50,marginBottom:12}}>♻️</div>
            <div style={{fontSize:20,fontWeight:700,color:"#c0983a",marginBottom:8}}>Prestige</div>
            <div style={{color:"#6a8060",fontSize:13,lineHeight:1.7,marginBottom:18}}>
              Recommence depuis zéro avec un bonus<br/>
              <span style={{color:"#c0983a",fontSize:18,fontWeight:700}}>×{(1+prestGain).toFixed(1)}</span><br/>
              permanent sur toute la production.<br/>
              <span style={{fontSize:11,color:"#4a5a44"}}>Tes achats boutique sont réinitialisés.</span>
            </div>
            {evo<8&&<div style={{color:"#8a4040",fontSize:12,marginBottom:14}}>⛔ Requis : stade 8 (Aubergine)</div>}
            <div style={{display:"flex",gap:10}}>
              <button className="tap" onClick={()=>setShowPrestige(false)} style={{
                flex:1,padding:"11px 0",borderRadius:12,border:"1px solid rgba(255,255,255,.07)",
                background:"transparent",color:"#6a8060",cursor:"pointer",fontSize:14,fontFamily:"inherit",
              }}>Annuler</button>
              <button className="tap" onClick={doPrestige} disabled={evo<8} style={{
                flex:1,padding:"11px 0",borderRadius:12,
                border:`1px solid ${evo>=8?"#c0983a55":"rgba(0,0,0,.3)"}`,
                background:evo>=8?"linear-gradient(135deg,#6a5020,#c0983a88)":"rgba(0,0,0,.3)",
                color:evo>=8?"#e0d0a0":"#444",cursor:evo>=8?"pointer":"not-allowed",
                fontSize:14,fontWeight:600,fontFamily:"inherit",
                animation:evo>=8?"presGlow 2s ease-in-out infinite":"none",
              }}>Confirmer ♻️</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Particules ── */}
      {particles.map(pt=>(
        <div key={pt.id} style={{
          position:"fixed",left:"50%",top:"44%",
          "--tx":`${pt.tx}px`,"--ty":`${pt.ty}px`,
          fontSize:pt.size||16,pointerEvents:"none",zIndex:200,
          animation:"riseOut 1.5s ease-out forwards",

      ))}

      {/* ── Nombres flottants ── */}
      {floatingNums.map(fn=>(
        <div key={fn.id} style={{
          position:"fixed",left:`${fn.x}%`,top:"55%",
          color:fn.col,fontWeight:700,pointerEvents:"none",zIndex:300,
          fontSize:fn.big?18:13,
          animation:"floatNum 1.2s ease-out forwards",
          textShadow:`0 0 8px ${fn.col}88`,
          whiteSpace:"nowrap",

      {/* ── Toasts ── */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:600,pointerEvents:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:5,paddingTop:8}}>

          <div key={t.id} style={{
            background:`${t.col}ee`,color:"#fff",fontWeight:600,
            padding:"6px 18px",borderRadius:999,fontSize:12,
            boxShadow:`0 4px 20px ${t.col}66`,
            animation:"toastIn 2.8s ease forwards",whiteSpace:"nowrap",
          }}>{t.msg}</div>
        ))}

      {/* ── Boost badge ── */}
      {boostTimeLeft>0&&(
        <div style={{
          position:"fixed",top:12,right:12,zIndex:400,
          background:"rgba(10,14,8,.9)",
          border:"1px solid #c0983a66",borderRadius:12,padding:"5px 12px",
          fontSize:11,fontWeight:700,color:"#c0983a",
          boxShadow:"0 3px 14px #c0983a44",
        }}>⚡ ×{boostMul} — {boostTimeLeft}s</div>
      )}

      {/* ── Combo badge ── */}
      {comboCount>4&&(
        <div style={{
          position:"fixed",top:12,left:12,zIndex:400,
          background:"rgba(10,14,8,.9)",
          border:"1px solid #5a8a5066",borderRadius:12,padding:"5px 12px",
          fontSize:11,fontWeight:700,color:comboCount>9?"#c0983a":"#6a9a50",
          animation:"comboFade .3s ease",
        }}>
          {comboCount>9?"🔥":"⚡"} ×{comboCount>9?"1.5":"1.2"} combo ({comboCount})
        </div>
      )}

      {/* ══════════════════════ CONTENU ══════════════════════ */}
      <div style={{width:"100%",maxWidth:440,position:"relative",zIndex:1}}>

        {/* ── Header ── */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:9}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#c0d4b8",letterSpacing:.8}}>🌾 Légume Évolution</div>
            {pCount>0&&<div style={{fontSize:10,color:"#c0983a"}}>♻️ Prestige {pCount} · ×{pMul.toFixed(1)}</div>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:12,color:"#c0983a"}}>🪙{fmt(coins)}</span>
            <span style={{fontSize:12,color:"#6a8060"}}>⭐{fmt(xp)}</span>

              background:ambientOn?"rgba(74,120,64,.25)":"rgba(0,0,0,.3)",

              background:evo>=8?"rgba(180,140,40,.15)":"rgba(0,0,0,.2)",

              borderRadius:8,padding:"3px 7px",cursor:"pointer",fontSize:13,
              color:evo>=8?"#c0983a":"#3a4a38",
              animation:evo>=8?"presGlow 2.5s ease-in-out infinite":"none",

          <div style={{background:"rgba(0,0,0,.45)",borderRadius:999,height:6,overflow:"hidden"}}>

              height:"100%",borderRadius:999,
              background:"linear-gradient(90deg,#2a5020,#6a9a50)",
              width:`${lvPct}%`,transition:"width 1s ease",

          </div>
        </div>

              flex:1,padding:"8px 2px",borderRadius:10,
              border:`1px solid ${tab===t?tierC+"55":"rgba(255,255,255,.06)"}`,
              background:tab===t?`${tierC}14`:"rgba(255,255,255,.03)",
              color:tab===t?"#c0d4b8":"#4a6a40",
              fontWeight:tab===t?600:400,cursor:"pointer",fontSize:t==="leaderboard"?9:11,
              transition:"all .2s",fontFamily:"inherit",
            }}>{l}</button>
          ))}
        </div>

        {/* ══════ JARDIN ══════ */}

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:11,animation:"fadeSlideIn .35s ease"}}>

            {/* Chaîne d'évolution */}

              width:"100%",overflowX:"auto",display:"flex",gap:4,alignItems:"center",
              padding:"7px 10px",scrollbarWidth:"none",

                <div key={v.id} title={`${v.name} (${TIER_NAMES[v.tier]})`} style={{
                  display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,

                  transform:i===evo?"scale(1.35)":"scale(1)",

                }}>
                  <span style={{
                    fontSize:i===evo?18:11,
                    filter:i===evo?`drop-shadow(0 0 6px ${TIER_COLORS[v.tier]||"#4a7a40"})`:"none",
                    "--gc":TIER_COLORS[v.tier]||"#4a7a40",
                    animation:i===evo?"glowPulse 2.5s ease-in-out infinite":"none",
                  }}>{v.emoji}</span>
                  {i<evo&&<div style={{width:5,height:5,borderRadius:"50%",background:"#4a7a40",marginTop:1}}/>}
                </div>
              ))}
            </div>

            {/* Tier badge */}
            <div style={{
              fontSize:11,color:tierC,letterSpacing:2,textTransform:"uppercase",
              borderBottom:`1px solid ${tierC}44`,paddingBottom:4,
            }}>
              {TIER_NAMES[veggie.tier]} — Évolution {evo+1}/{CHAIN.length}
            </div>

            {/* ── Zone centrale légume ── */}
            <div style={{position:"relative",width:220,height:220,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {/* Anneaux orbitaux */}
              {[80,105,128].map((r,i)=>(
                <div key={i} style={{
                  position:"absolute",width:r*2,height:r*2,borderRadius:"50%",
                  border:`1px solid ${tierC}${["22","14","09"][i]}`,
                  animation:`float ${3+i}s ease-in-out infinite`,
                  animationDelay:`${i*1.2}s`,
                }}/>
              ))}
              {/* Anneaux brillants au prestige */}
              {pCount>0&&[60,90].map((r,i)=>(
                <div key={"p"+i} style={{
                  position:"absolute",width:r*2,height:r*2,borderRadius:"50%",
                  border:`1px solid #c0983a${i===0?"44":"22"}`,
                  animation:`ringExpand ${2+i}s ease-out infinite`,
                  animationDelay:`${i*1}s`,
                }}/>
              ))}
              {/* Orbiteurs */}
              {!isMax&&[
                {emoji:"💧",r:92,speed:3.5,dir:1},
                {emoji:"☀️",r:92,speed:5,dir:-1,delay:"-1.5s"},
              ].map((o,i)=>(
                <div key={i} style={{
                  position:"absolute",width:"100%",height:"100%",borderRadius:"50%",
                  display:"flex",alignItems:"center",justifyContent:"center",
                }}>
                  <div style={{
                    position:"absolute","--r":`${o.r}px`,fontSize:13,
                    animation:`orbitSpin ${o.speed}s linear infinite ${o.dir<0?"reverse":""}`,
                    animationDelay:o.delay||"0s",
                  }}>{o.emoji}</div>
                </div>
              ))}
              {/* Sol */}
              <div style={{
                position:"absolute",bottom:18,left:"50%",transform:"translateX(-50%)",
                width:90,height:14,borderRadius:"50%",
                background:"radial-gradient(ellipse,#2a1a0e 0%,transparent 70%)",
              }}/>
              {/* Légume principal */}
              <div style={{
                fontSize:96,userSelect:"none",zIndex:2,
                transition:"font-size .7s cubic-bezier(.17,.67,.44,1.3), filter .5s",
                filter:`drop-shadow(0 4px 20px ${tierC}77)`,
                "--gc":tierC,
                animation:isMax
                  ?"glowPulse 2s ease-in-out infinite, float 3s ease-in-out infinite"
                  :"float 4s ease-in-out infinite",
              }}>{veggie.emoji}</div>
            </div>

            {/* Nom + desc */}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:"#dce8d4",letterSpacing:.5}}>{veggie.name}</div>
              <div style={{fontSize:12,color:"#4a6a40",marginTop:3,fontStyle:"italic"}}>« {veggie.desc} »</div>
              <div style={{fontSize:10,color:"#3a4a38",marginTop:4}}>
                {totalEvo} évolutions · {pCount>0&&<span style={{color:"#c0983a"}}>×{pMul.toFixed(1)} prestige · </span>}
                🎯 {realCrit}% crit
              </div>
            </div>

            {!isMax&&(<>
              {/* Barres */}
              <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
                {[[wPct,water,veggie.needW,"#4a7a9a","#1e3a4a","#7aacc8","💧","Eau",wAuto,wClick],
                  [sPct,sun,veggie.needS,"#9a7030","#4a3010","#c8a84a","☀️","Soleil",sAuto,sClick]
                ].map(([pct,val,need,col,dim,bright,ico,label,auto,clk],idx)=>(
                  <div key={idx}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                      <span style={{color:bright}}>

                        <span style={{color:"#3a4a38",fontSize:9}}> /{fmt(clk)}/clic</span>
                      </span>
                      <span style={{color:"#4a6a40"}}>{fmt(val)} / {fmt(need)}</span>
                    </div>
                    <div style={{background:"rgba(0,0,0,.45)",borderRadius:999,height:14,overflow:"hidden",position:"relative"}}>
                      <div style={{
                        height:"100%",borderRadius:999,
                        background:pct>=100
                          ?`linear-gradient(90deg,${col},${bright})`
                          :`linear-gradient(90deg,${dim},${col})`,
                        width:`${pct}%`,transition:"width .2s ease",
                        boxShadow:`0 0 8px ${col}44`,
                      }}/>
                      {pct>=100&&<div style={{
                        position:"absolute",inset:0,
                        background:"linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)",
                        backgroundSize:"200% 100%",animation:"shimmerBar 1.2s linear infinite",
                      }}/>}
                      <div style={{
                        position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:9,color:"rgba(255,255,255,.5)",fontWeight:600,
                      }}>{Math.round(pct)}%</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Boutons clic */}
              <div style={{display:"flex",gap:10,width:"100%"}}>
                {[
                  {type:"water",icon:"💧",label:"Arroser",color:"#1e3a4a",colBright:"#4a7a9a",textCol:"#7aacc8",val:wClick},
                  {type:"sun",  icon:"☀️",label:"Soleil",  color:"#4a3010",colBright:"#9a7030",textCol:"#c8a84a",val:sClick},
                ].map(b=>(
                  <button key={b.type} className="tap" onClick={()=>handleClick(b.type)} style={{
                    flex:1,padding:"16px 0",borderRadius:16,
                    background:`linear-gradient(145deg,${b.color},${b.colBright}88)`,
                    border:`1px solid ${b.colBright}44`,color:"#e0e8d8",
                    fontSize:26,cursor:"pointer",fontFamily:"inherit",
                    boxShadow:`0 5px 20px ${b.color}88`,
                    transition:"transform .1s,box-shadow .1s",
                  }}>
                    {b.icon}
                    <div style={{fontSize:10,marginTop:2,color:b.textCol}}>
                      +{fmt(b.val)}{b.type==="water"?"💧":"☀️"} · {realCrit}%🎯
                    </div>
                  </button>
                ))}
              </div>

              {/* Prochaine evo info */}
              {CHAIN[evo+1]&&(
                <div className="card" style={{
                  width:"100%",padding:"7px 12px",
                  display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,
                }}>
                  <span style={{color:"#4a6a40"}}>Prochain : {CHAIN[evo+1].emoji} <b style={{color:"#8aaa78"}}>{CHAIN[evo+1].name}</b></span>
                  <span style={{color:"#c0983a"}}>+{fmt(veggie.coins)}🪙 +{fmt(veggie.xp)}⭐</span>
                </div>
              )}
            </>)}

            {isMax&&(
              <div style={{
                textAlign:"center",padding:"28px 20px",width:"100%",
                background:"linear-gradient(135deg,rgba(10,14,8,.8),rgba(180,150,50,.1))",
                borderRadius:20,border:"1.5px solid #c0983a44",
                animation:"glowPulse 2.5s infinite","--gc":"#c0983a",
              }}>
                <div style={{fontSize:60,animation:"float 3s ease-in-out infinite"}}>✨</div>
                <div style={{fontSize:20,color:"#c0983a",fontWeight:700,margin:"10px 0 6px"}}>Légume Divin</div>
                <div style={{color:"#4a6a40",fontSize:12,lineHeight:1.7}}>
                  La perfection absolue.<br/>
                  {totalEvo} évolutions · {fmt(xp)} XP · {pCount} prestiges
                </div>
                <button className="tap" onClick={()=>setShowPrestige(true)} style={{
                  marginTop:14,padding:"10px 24px",borderRadius:12,
                  background:"linear-gradient(135deg,#6a5020,#c0983a88)",
                  border:"1px solid #c0983a66",color:"#e0d0a0",
                  cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",
                }}>♻️ Recommencer en Prestige</button>
              </div>
            )}
          </div>
        )}

        {/* ══════ BOUTIQUE ══════ */}
        {tab==="shop"&&(
          <div style={{display:"flex",flexDirection:"column",gap:9,animation:"fadeSlideIn .3s ease"}}>
            {/* Résumé */}
            <div className="card" style={{padding:"9px 12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,fontSize:11}}>
              <span style={{color:"#7aacc8"}}>💧 clic +{fmt(wClick)}</span>
              <span style={{color:"#c8a84a"}}>☀️ clic +{fmt(sClick)}</span>
              {wAuto>0&&<span style={{color:"#4a7a9a"}}>🚿 +{fmt(wAuto)}/s</span>}
              {sAuto>0&&<span style={{color:"#9a7030"}}>🌤️ +{fmt(sAuto)}/s</span>}
              <span style={{color:"#6a8a60"}}>🎯 {realCrit}% crit</span>
              {pCount>0&&<span style={{color:"#c0983a"}}>♻️ ×{pMul.toFixed(1)}</span>}
            </div>
            {/* Sub-tabs */}
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {shopGroups.map(g=>(
                <button key={g.key} className="tap" onClick={()=>setShopTab(g.key)} style={{
                  flex:1,minWidth:55,padding:"5px 2px",borderRadius:8,
                  border:`1px solid ${shopTab===g.key?"#4a7840":"rgba(255,255,255,.05)"}`,
                  background:shopTab===g.key?"rgba(74,120,64,.15)":"rgba(0,0,0,.25)",
                  color:shopTab===g.key?"#8aaa78":"#4a5a44",
                  cursor:"pointer",fontSize:9,fontWeight:shopTab===g.key?600:400,
                  transition:"all .15s",fontFamily:"inherit",
                }}>{g.label}</button>
              ))}
            </div>
            {/* Items */}
            {SHOP.filter(i=>i.t===shopTab).map(item=>{
              const cost=costs[item.id], count=owned[item.id]||0, can=coins>=cost;
              return(
                <div key={item.id} className="tap shop-row" onClick={()=>onBuy(item)} style={{
                  display:"flex",alignItems:"center",gap:10,
                  background:can?"rgba(255,255,255,.03)":"rgba(0,0,0,.2)",
                  border:`1px solid ${can?"rgba(255,255,255,.06)":"rgba(255,255,255,.02)"}`,
                  borderRadius:12,padding:"9px 11px",
                  cursor:can?"pointer":"not-allowed",
                  opacity:can?1:.38,transition:"all .15s",
                }}>
                  <span style={{fontSize:22,flexShrink:0}}>{item.icon}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#c0d4b8"}}>
                      {item.name}
                      {count>0&&<span style={{color:"#c0983a",fontSize:10,marginLeft:5}}>×{count}</span>}
                    </div>
                    <div style={{fontSize:10,color:"#4a6a40",marginTop:1}}>{item.desc}</div>
                  </div>
                  <div style={{
                    background:can?"linear-gradient(135deg,#2a4a20,#4a7a40aa)":"rgba(0,0,0,.3)",
                    borderRadius:8,padding:"4px 10px",
                    fontSize:11,fontWeight:600,
                    color:can?"#8aaa78":"#333",whiteSpace:"nowrap",flexShrink:0,
                  }}>{fmt(cost)}🪙</div>
                </div>
              );
            })}
          </div>
        )}

        {/* ══════ SUCCÈS ══════ */}
        {tab==="achievements"&&(
          <div style={{display:"flex",flexDirection:"column",gap:7,animation:"fadeSlideIn .3s ease"}}>
            <div style={{textAlign:"center",fontSize:11,color:"#4a6a40",marginBottom:4}}>
              {unlockedAch.length}/{ACHIEVEMENTS.length} débloqués
            </div>
            <div style={{background:"rgba(0,0,0,.4)",borderRadius:999,height:6,overflow:"hidden",marginBottom:6}}>
              <div style={{
                height:"100%",borderRadius:999,
                background:"linear-gradient(90deg,#6a5020,#c0983a)",
                width:`${unlockedAch.length/ACHIEVEMENTS.length*100}%`,transition:"width .8s ease",
              }}/>
            </div>
            {ACHIEVEMENTS.map(a=>{
              const done=unlockedAch.includes(a.id);
              return(
                <div key={a.id} style={{
                  display:"flex",alignItems:"center",gap:10,
                  background:done?"rgba(180,150,50,.06)":"rgba(255,255,255,.02)",
                  border:`1px solid ${done?"rgba(180,150,50,.25)":"rgba(255,255,255,.04)"}`,
                  borderRadius:12,padding:"9px 11px",
                  opacity:done?1:.45,transition:"opacity .4s, border-color .4s",
                }}>
                  <span style={{fontSize:24,filter:done?`drop-shadow(0 0 6px #c0983a)`:"grayscale(1)"}}>{a.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:done?"#c0983a":"#4a5a44"}}>{a.t}</div>
                    <div style={{fontSize:10,color:"#3a4a38",marginTop:1}}>{a.d}</div>
                  </div>
                  {done&&<div style={{color:"#6a9a50",fontSize:16}}>✓</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ══════ CLASSEMENT MONDIAL ══════ */}
        {tab==="leaderboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadeSlideIn .35s ease"}}>

            {/* Bannière mondiale */}
            <div style={{
              textAlign:"center",padding:"14px 12px",
              background:"linear-gradient(135deg,rgba(180,150,50,.08),rgba(74,120,64,.08))",
              borderRadius:16,border:"1px solid rgba(180,150,50,.2)",
            }}>
              <div style={{fontSize:28,marginBottom:4}}>🌍</div>
              <div style={{fontSize:15,fontWeight:700,color:"#c0d4b8",letterSpacing:1}}>Classement Mondial</div>
              <div style={{fontSize:10,color:"#4a6a40",marginTop:2}}>Les meilleurs joueurs du monde entier</div>
            </div>

            {/* Inscription / Mise à jour score */}
            {!playerName ? (
              <div style={{
                background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",
                borderRadius:14,padding:"14px 14px",
              }}>
                <div style={{fontSize:12,color:"#8aaa78",marginBottom:10,fontWeight:600}}>
                  📝 Inscris-toi au classement
                </div>
                <div style={{display:"flex",gap:8}}>
                  <input
                    value={nameInput}
                    onChange={e=>setNameInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&submitScore(nameInput)}
                    placeholder="Ton pseudo (2-16 car.)"
                    maxLength={16}
                    style={{
                      flex:1,background:"rgba(0,0,0,.4)",border:"1px solid rgba(255,255,255,.1)",
                      borderRadius:10,padding:"8px 12px",color:"#c0d4b8",fontSize:13,
                      fontFamily:"inherit",outline:"none",
                    }}
                  />
                  <button className="tap" onClick={()=>submitScore(nameInput)} disabled={submitLoading||nameInput.trim().length<2} style={{
                    padding:"8px 14px",borderRadius:10,
                    background:nameInput.trim().length>=2?"linear-gradient(135deg,#2a5020,#4a8a40aa)":"rgba(0,0,0,.3)",
                    border:`1px solid ${nameInput.trim().length>=2?"#4a7a40":"rgba(0,0,0,.2)"}`,
                    color:nameInput.trim().length>=2?"#8aaa78":"#3a4a38",
                    cursor:nameInput.trim().length>=2?"pointer":"not-allowed",
                    fontFamily:"inherit",fontSize:13,fontWeight:600,whiteSpace:"nowrap",
                  }}>{submitLoading?"…":"Rejoindre"}</button>
                </div>
                <div style={{fontSize:10,color:"#3a4a38",marginTop:6}}>
                  ⚠️ Le classement est public — ton pseudo et tes scores seront visibles par tous.
                </div>
              </div>
            ) : (
              <div style={{
                background:"rgba(180,150,50,.07)",border:"1px solid rgba(180,150,50,.2)",
                borderRadius:14,padding:"10px 14px",
                display:"flex",alignItems:"center",justifyContent:"space-between",
              }}>
                <div>
                  <div style={{fontSize:12,color:"#c0983a",fontWeight:600}}>🎮 {playerName}</div>
                  <div style={{fontSize:10,color:"#6a8060",marginTop:1}}>
                    {myRanks.coins&&`🪙 Rang #${myRanks.coins}`}
                    {myRanks.prestige&&` · ♻️ Rang #${myRanks.prestige}`}
                    {!myRanks.coins&&!myRanks.prestige&&"Pas encore classé"}
                  </div>
                </div>
                <button className="tap" onClick={()=>submitScore(playerName)} disabled={submitLoading} style={{
                  padding:"6px 12px",borderRadius:9,
                  background:"linear-gradient(135deg,#2a5020,#4a8a40aa)",
                  border:"1px solid #4a7a40",color:"#8aaa78",
                  cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,
                }}>{submitLoading?"…":"↑ Mettre à jour"}</button>
              </div>
            )}

            {/* Sous-onglets classement */}
            <div style={{display:"flex",gap:6}}>
              {[["coins","🪙 Pièces gagnées"],["prestige","♻️ Prestiges"]].map(([k,l])=>(
                <button key={k} className="tap" onClick={()=>setLbTab(k)} style={{
                  flex:1,padding:"8px 0",borderRadius:10,
                  border:`1px solid ${lbTab===k?"rgba(180,150,50,.4)":"rgba(255,255,255,.06)"}`,
                  background:lbTab===k?"rgba(180,150,50,.1)":"rgba(255,255,255,.02)",
                  color:lbTab===k?"#c0983a":"#4a6a40",
                  fontWeight:lbTab===k?700:400,cursor:"pointer",fontSize:11,fontFamily:"inherit",
                  transition:"all .2s",
                }}>{l}</button>
              ))}
            </div>

            {/* Bouton refresh */}
            <button className="tap" onClick={fetchLeaderboard} disabled={lbLoading} style={{
              padding:"7px 0",borderRadius:10,width:"100%",
              background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",
              color:"#4a6a40",cursor:"pointer",fontSize:11,fontFamily:"inherit",
              transition:"all .2s",
            }}>{lbLoading?"⏳ Chargement…":"🔄 Actualiser le classement"}</button>

            {/* Liste classement */}
            {(()=>{
              const entries = leaderboard[lbTab] || [];
              if (lbLoading) return (
                <div style={{textAlign:"center",padding:"30px",color:"#4a6a40",fontSize:13}}>
                  <div style={{fontSize:32,animation:"float 1s ease-in-out infinite"}}>🌱</div>
                  <div style={{marginTop:8}}>Chargement…</div>
                </div>
              );
              if (entries.length === 0) return (
                <div style={{
                  textAlign:"center",padding:"28px 16px",
                  background:"rgba(255,255,255,.02)",borderRadius:14,
                  border:"1px solid rgba(255,255,255,.05)",
                }}>
                  <div style={{fontSize:36,marginBottom:8}}>🌍</div>
                  <div style={{color:"#4a6a40",fontSize:12}}>Personne encore classé.<br/>Sois le premier !</div>
                </div>
              );
              const RANK_STYLES = [
                {bg:"rgba(212,175,55,.12)",border:"rgba(212,175,55,.35)",color:"#d4af37",badge:"🥇"},
                {bg:"rgba(192,192,192,.1)",border:"rgba(192,192,192,.3)",color:"#b0b8b0",badge:"🥈"},
                {bg:"rgba(176,141,87,.1)",border:"rgba(176,141,87,.3)",color:"#b08050",badge:"🥉"},
              ];
              return entries.map((entry, i) => {
                const isMe = entry.name === playerName;
                const rs = RANK_STYLES[i] || {};
                return (
                  <div key={entry.name} style={{
                    display:"flex",alignItems:"center",gap:10,
                    background:isMe?"rgba(74,120,64,.15)":rs.bg||"rgba(255,255,255,.025)",
                    border:`1px solid ${isMe?"rgba(74,120,64,.4)":rs.border||"rgba(255,255,255,.06)"}`,
                    borderRadius:13,padding:"10px 12px",
                    transition:"all .2s",
                    boxShadow:isMe?"0 0 12px rgba(74,120,64,.2)":"none",
                  }}>
                    {/* Rang */}
                    <div style={{
                      width:28,textAlign:"center",flexShrink:0,
                      fontSize:i<3?18:12,
                      color:rs.color||"#4a6a40",
                      fontWeight:700,
                    }}>{rs.badge||`#${i+1}`}</div>
                    {/* Légume */}
                    <div style={{fontSize:20,flexShrink:0}}>{entry.veggie}</div>
                    {/* Infos */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{
                        fontSize:13,fontWeight:isMe?700:600,
                        color:isMe?"#8aaa78":rs.color||"#c0d4b8",
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                      }}>
                        {entry.name}{isMe&&<span style={{fontSize:10,color:"#6a9a50",marginLeft:5}}>(toi)</span>}
                      </div>
                      <div style={{fontSize:10,color:"#4a5a44",marginTop:1}}>
                        {lbTab==="coins"
                          ?`Évo. ${entry.evo+1} · ♻️ ${entry.pCount} prestiges`
                          :`${entry.totalEvo} évolutions totales`
                        }
                      </div>
                    </div>
                    {/* Score */}
                    <div style={{
                      textAlign:"right",flexShrink:0,
                    }}>
                      <div style={{
                        fontSize:13,fontWeight:700,
                        color:rs.color||"#c0983a",
                      }}>
                        {lbTab==="coins"?`${fmt(entry.score)}🪙`:`${entry.score}♻️`}
                      </div>
                      <div style={{fontSize:9,color:"#3a4a38",marginTop:1}}>
                        {new Date(entry.timestamp).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}
                      </div>
                    </div>
                  </div>
                );
              });
            })()}

          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
